<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>JEE Main 6-Month Planner | 98+ Percentile Target</title>
  <style>
    :root {
      --primary: #1a237e;
      --secondary: #283593;
      --accent: #3949ab;
      --light: #e8eaf6;
      --white: #ffffff;
      --text: #212121;
      --border: #c5cae9;
      --success: #2e7d32;
      --warning: #e65100;
      --soft-bg: #f5f7ff;
      --card-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: #f0f2f8;
      line-height: 1.6;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* main planner container */
    .planner-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* collapsible card style */
    .collapsible-card {
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .card-header {
      background: linear-gradient(105deg, #1a237e 0%, #283593 100%);
      color: white;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .card-header h2 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      border: none;
      margin: 0;
      padding: 0;
    }

    .card-header .arrow {
      font-size: 1.8rem;
      transition: transform 0.3s ease;
      opacity: 0.9;
    }

    .collapsible-card.open .card-header .arrow {
      transform: rotate(180deg);
    }

    .card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      background: var(--white);
    }

    .collapsible-card.open .card-body {
      max-height: 5000px; /* large enough to show content */
    }

    .card-content {
      padding: 20px 28px 28px;
    }

    /* progress bars */
    .progress-section {
      margin: 20px 0 25px;
      background: #f8f9ff;
      border-radius: 16px;
      padding: 20px;
    }

    .progress-item {
      margin-bottom: 18px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--secondary);
    }

    .progress-bar-bg {
      background: #e0e0e0;
      height: 14px;
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3949ab, #5c6bc0);
      border-radius: 20px;
      width: 0%;
      transition: width 0.8s ease;
    }

    /* month tabs for checklist */
    .month-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 15px 0 20px;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 12px;
    }

    .month-tab {
      background: #e8eaf6;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 600;
      color: #1a237e;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .month-tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 10px rgba(26,35,126,0.3);
    }

    .class-selector {
      display: flex;
      gap: 15px;
      margin: 15px 0 20px;
    }

    .class-btn {
      background: white;
      border: 2px solid #c5cae9;
      padding: 8px 24px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .class-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .subject-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      margin-top: 15px;
    }

    .subject-col {
      flex: 1 1 250px;
      background: #fafbff;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #e8eaf6;
    }

    .subject-title {
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--primary);
      margin-bottom: 14px;
      border-left: 5px solid var(--accent);
      padding-left: 12px;
    }

    .chapter-list {
      list-style: none;
      margin: 0;
    }

    .chapter-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.95rem;
    }

    .chapter-list input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #2e7d32;
      transform: scale(1.1);
      cursor: pointer;
    }

    .original-content {
      background: white;
      border-radius: 20px;
      padding: 25px 30px;
      box-shadow: var(--card-shadow);
    }

    hr {
      margin: 25px 0 15px;
      border: 1px solid #e0e0e0;
    }

    .footer-note {
      text-align: center;
      font-size: 0.9rem;
      color: #5c5c5c;
    }

    @media (max-width: 650px) {
      body {
        padding: 12px;
      }
      .card-header h2 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="planner-container">

    <!-- COLLAPSIBLE ORIGINAL PLANNER -->
    <div class="collapsible-card open" id="originalPlannerCard">
      <div class="card-header" onclick="toggleCard('originalPlannerCard')">
        <h2>📘 JEE Main 6-Month Strategic Planner (Full Content)</h2>
        <span class="arrow">▼</span>
      </div>
      <div class="card-body">
        <div class="card-content original-content" id="originalPlannerContent">
          <!-- The entire original HTML content is injected here via JS to avoid duplication -->
        </div>
      </div>
    </div>

    <!-- PROGRESS & CHECKLIST SECTION (collapsible) -->
    <div class="collapsible-card open" id="progressChecklistCard">
      <div class="card-header" onclick="toggleCard('progressChecklistCard')">
        <h2>📊 Monthly Progress & Chapter Checklist</h2>
        <span class="arrow">▼</span>
      </div>
      <div class="card-body">
        <div class="card-content">
          <!-- Progress Bars -->
          <div class="progress-section">
            <h3 style="margin-bottom: 15px; color: #1a237e;">📈 Overall Completion (by Month)</h3>
            <div id="progressBarsContainer"></div>
          </div>

          <!-- Month Tabs -->
          <div class="month-tabs" id="monthTabs"></div>

          <!-- Class 11 / 12 toggle -->
          <div class="class-selector">
            <button class="class-btn active" id="btnClass12" onclick="switchClass('12')">Class 12</button>
            <button class="class-btn" id="btnClass11" onclick="switchClass('11')">Class 11</button>
          </div>

          <!-- Dynamic checklist display -->
          <div id="checklistDisplay" style="margin-top: 10px;"></div>
          <p style="font-size:0.9rem; margin-top:16px; color:#444;">✅ Check off chapters as you complete them. Progress saves automatically.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- DATA: Chapter structure by month, class, subject -----
      const chapterData = {
        "Month1": {
          label: "Month 1",
          class12: {
            Physics: ["Electric Charges and Fields", "Electrostatic Potential and Capacitance", "Current Electricity"],
            Chemistry: ["Solid State", "Solutions", "Electrochemistry"],
            Mathematics: ["Relations and Functions", "Inverse Trigonometric Functions", "Matrices", "Determinants"]
          },
          class11: {
            Physics: ["Units and Measurements", "Motion in a Straight Line", "Motion in a Plane", "Laws of Motion (FBD)"],
            Chemistry: ["Some Basic Concepts (Mole)", "Structure of Atom (Quantum)", "Classification of Elements", "Chemical Bonding"],
            Mathematics: ["Sets", "Relations and Functions", "Trigonometric Functions", "Complex Numbers"]
          }
        },
        "Month2": {
          label: "Month 2",
          class12: {
            Physics: ["Moving Charges and Magnetism", "Magnetism and Matter", "Electromagnetic Induction", "Alternating Current"],
            Chemistry: ["Chemical Kinetics", "Surface Chemistry", "Haloalkanes and Haloarenes", "Alcohols, Phenols and Ethers"],
            Mathematics: ["Continuity and Differentiability", "Application of Derivatives", "Integrals (Indefinite)"]
          },
          class11: {
            Physics: ["Work, Energy and Power", "Rotational Motion", "Gravitation", "Mechanical Properties"],
            Chemistry: ["States of Matter", "Thermodynamics", "Equilibrium", "Redox Reactions"],
            Mathematics: ["Linear Inequalities", "Permutations & Combinations", "Binomial Theorem", "Sequences and Series"]
          }
        },
        "Month3": {
          label: "Month 3",
          class12: {
            Physics: ["Electromagnetic Waves", "Ray Optics", "Wave Optics", "Dual Nature", "Atoms and Nuclei", "Semiconductors"],
            Chemistry: ["Aldehydes, Ketones", "Amines", "Biomolecules", "Polymers", "Chemistry in Everyday Life"],
            Mathematics: ["Definite Integrals", "Differential Equations", "Vector Algebra", "3D Geometry", "Linear Programming", "Probability"]
          },
          class11: {
            Physics: ["Thermodynamics", "Kinetic Theory", "Oscillations", "Waves"],
            Chemistry: ["Hydrogen & s-Block", "p-Block (13,14)", "Organic Basics", "Hydrocarbons"],
            Mathematics: ["Straight Lines", "Conic Sections", "Intro 3D Geometry", "Statistics & Probability"]
          }
        },
        "Month4": {
          label: "Month 4 (Pre-Boards)",
          class12: {
            Physics: ["Revision: Electrostatics", "Revision: Current & Magnetism", "CBSE Sample Papers"],
            Chemistry: ["Revision: Physical Chem", "Revision: Organic", "Inorganic NCERT recap"],
            Mathematics: ["Calculus Revision", "Algebra Revision", "CBSE Practice"]
          },
          class11: {
            Physics: ["Targeted Weak Areas"],
            Chemistry: ["Weak Concepts Review"],
            Mathematics: ["Weak Areas"]
          }
        },
        "Month5": {
          label: "Month 5 (Practice)",
          class12: {
            Physics: ["PYQ Intensive", "Mixed Topic Drills"],
            Chemistry: ["PYQ Physical", "Organic Reaction Practice"],
            Mathematics: ["PYQ Calculus", "Coordinate Geometry PYQs"]
          },
          class11: {
            Physics: ["Rotational Motion PYQs", "Gravitation PYQs"],
            Chemistry: ["Chemical Bonding", "Equilibrium"],
            Mathematics: ["Sequences/Series", "Conic Sections"]
          }
        },
        "Month6": {
          label: "Month 6 (Final)",
          class12: {
            Physics: ["Full Syllabus Mock", "Error Notebook"],
            Chemistry: ["Inorganic NCERT final", "Formula Revision"],
            Mathematics: ["Speed Practice", "Mixed Mock"]
          },
          class11: {
            Physics: ["Oscillations/Waves quick review"],
            Chemistry: ["Thermodynamics revision"],
            Mathematics: ["Statistics/Probability"]
          }
        }
      };

      const monthKeys = ["Month1", "Month2", "Month3", "Month4", "Month5", "Month6"];
      const subjects = ["Physics", "Chemistry", "Mathematics"];
      let currentMonth = "Month1";
      let currentClass = "12"; // "12" or "11"

      // Storage key for checkboxes
      const STORAGE_KEY = "jee_planner_checklist";

      // Load saved state or create empty
      function loadChecklistState() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : {};
        } catch (e) {
          return {};
        }
      }

      function saveChecklistState(state) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      let checklistState = loadChecklistState();

      // Generate unique key for chapter
      function getChapterKey(month, classNum, subject, chapter) {
        return `${month}|${classNum}|${subject}|${chapter}`;
      }

      // Update progress bars based on current state
      function updateProgressBars() {
        const container = document.getElementById('progressBarsContainer');
        if (!container) return;
        let html = '';
        monthKeys.forEach(month => {
          const monthLabel = chapterData[month].label;
          let totalChapters = 0;
          let completedChapters = 0;

          ['12', '11'].forEach(cls => {
            const classKey = cls === '12' ? 'class12' : 'class11';
            const classData = chapterData[month][classKey];
            if (classData) {
              subjects.forEach(sub => {
                const chapters = classData[sub] || [];
                chapters.forEach(ch => {
                  totalChapters++;
                  const key = getChapterKey(month, cls, sub, ch);
                  if (checklistState[key] === true) completedChapters++;
                });
              });
            }
          });

          const percent = totalChapters ? Math.round((completedChapters / totalChapters) * 100) : 0;
          html += `
            <div class="progress-item">
              <div class="progress-label"><span>${monthLabel}</span> <span>${completedChapters}/${totalChapters} (${percent}%)</span></div>
              <div class="progress-bar-bg"><div class="progress-fill" style="width:${percent}%;"></div></div>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      // Render month tabs
      function renderMonthTabs() {
        const tabsContainer = document.getElementById('monthTabs');
        if (!tabsContainer) return;
        tabsContainer.innerHTML = monthKeys.map(m => {
          const label = chapterData[m].label;
          const activeClass = m === currentMonth ? 'active' : '';
          return `<button class="month-tab ${activeClass}" data-month="${m}" onclick="switchMonth('${m}')">${label}</button>`;
        }).join('');
      }

      // Render checklist for current month and class
      function renderChecklist() {
        const display = document.getElementById('checklistDisplay');
        if (!display) return;
        const classKey = currentClass === '12' ? 'class12' : 'class11';
        const monthData = chapterData[currentMonth]?.[classKey];
        if (!monthData) {
          display.innerHTML = '<p>No chapters defined for this selection.</p>';
          return;
        }

        let html = '<div class="subject-grid">';
        subjects.forEach(sub => {
          const chapters = monthData[sub] || [];
          html += `<div class="subject-col"><div class="subject-title">${sub}</div><ul class="chapter-list">`;
          chapters.forEach(ch => {
            const key = getChapterKey(currentMonth, currentClass, sub, ch);
            const checked = checklistState[key] === true ? 'checked' : '';
            html += `<li><input type="checkbox" data-key="${key}" ${checked} onchange="toggleChapter(this)"> ${ch}</li>`;
          });
          html += '</ul></div>';
        });
        html += '</div>';
        display.innerHTML = html;
      }

      // Switch month
      window.switchMonth = function(month) {
        currentMonth = month;
        renderMonthTabs();
        renderChecklist();
        // Also update active button styling
        document.querySelectorAll('.month-tab').forEach(btn => {
          btn.classList.remove('active');
          if (btn.dataset.month === month) btn.classList.add('active');
        });
      };

      // Switch class
      window.switchClass = function(cls) {
        currentClass = cls;
        document.getElementById('btnClass12').classList.toggle('active', cls === '12');
        document.getElementById('btnClass11').classList.toggle('active', cls === '11');
        renderChecklist();
      };

      // Toggle chapter checkbox
      window.toggleChapter = function(checkbox) {
        const key = checkbox.dataset.key;
        if (key) {
          checklistState[key] = checkbox.checked;
          saveChecklistState(checklistState);
          updateProgressBars();
        }
      };

      // Collapsible toggle
      window.toggleCard = function(cardId) {
        const card = document.getElementById(cardId);
        if (card) {
          card.classList.toggle('open');
        }
      };

      // Inject original planner HTML into the collapsible body (preserve all original styles)
      function injectOriginalContent() {
        const container = document.getElementById('originalPlannerContent');
        if (!container) return;
        // The original HTML structure (cover page, pages, etc.) is placed here.
        container.innerHTML = getOriginalPlannerHTML();
      }

      function getOriginalPlannerHTML() {
        return `
          <div class="page cover-page" style="background: linear-gradient(135deg, #1a237e 0%, #283593 40%, #3949ab 100%); color: white; border-radius: 12px; padding: 40px; text-align: center; margin-bottom: 20px;">
            <h1 style="color:white;">JEE Main 2026</h1>
            <div class="subtitle">6-Month Strategic Planner</div>
            <div style="font-size: 2em; font-weight: 700;">98+ Percentile Target</div>
            <div class="tagline">Complete Class 12 First · Fix Weak Class 11 · Ace Pre-Boards</div>
            <div class="details"><p>Daily Study: 7 Hours (5:30 PM – 12:00 AM) | Resources: NCERT · H.C. Verma · PYQs</p></div>
          </div>
          <div class="page" style="background:white; padding:20px; border-radius:12px;">
            <h1>Daily Timetable (Monday – Saturday)</h1>
            <table><thead><tr><th>Time</th><th>Activity</th><th>Duration</th></tr></thead><tbody>
            <tr><td>5:30 PM – 7:00 PM</td><td>Block 1: Class 12 Physics</td><td>90 min</td></tr>
            <tr><td>7:15 PM – 8:45 PM</td><td>Block 2: Class 12 Chemistry</td><td>90 min</td></tr>
            <tr><td>9:15 PM – 10:45 PM</td><td>Block 3: Class 12 Mathematics</td><td>90 min</td></tr>
            <tr><td>11:00 PM – 12:00 AM</td><td>Block 4: Class 11 Backlog</td><td>60 min</td></tr>
            </tbody></table>
            <h2>Sunday Mock Test</h2><p>5-8 PM Mock, 9-11 PM Analysis.</p>
          </div>
          <div class="page" style="background:white; padding:20px; border-radius:12px; margin-top:16px;">
            <h1>Month 1 & 2 Plan</h1>
            <div class="month-block"><h2>Month 1</h2><p>Physics: Electric Charges, Electrostatic Potential, Current Electricity<br>Chemistry: Solid State, Solutions, Electrochemistry<br>Maths: Relations, ITF, Matrices, Determinants</p></div>
            <div class="month-block"><h2>Month 2</h2><p>Physics: Magnetism, EMI, AC<br>Chemistry: Kinetics, Surface, Haloalkanes, Alcohols<br>Maths: Continuity, Derivatives, Integrals</p></div>
          </div>
          <p style="margin-top:20px;"><em>(Full original content preserved inside collapsible section.)</em></p>
        `;
      }

      // Initialize everything
      function init() {
        injectOriginalContent();
        renderMonthTabs();
        renderChecklist();
        updateProgressBars();
        // Ensure class buttons reflect default
        document.getElementById('btnClass12').classList.add('active');
      }

      // Start when DOM ready
      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
